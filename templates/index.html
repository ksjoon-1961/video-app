<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>VideoApp</title>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#4F46E5">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="container">
    <!-- 비로그인 상태 -->
    <section id="auth-section">
      <h1>VideoApp</h1>
      <button id="install-btn" class="install-btn hidden" onclick="handleInstall()">홈 화면에 추가</button>

      <div class="tab-bar">
        <button id="tab-login"  class="tab active" onclick="showTab('login')">로그인</button>
        <button id="tab-signup" class="tab"        onclick="showTab('signup')">회원가입</button>
      </div>

      <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
        <input type="email"    id="login-email"    placeholder="이메일"    required autocomplete="email">
        <input type="password" id="login-password" placeholder="비밀번호"  required autocomplete="current-password">
        <button type="submit"  id="login-btn">로그인</button>
      </form>

      <form id="signup-form" class="auth-form hidden" onsubmit="handleSignup(event)">
        <input type="email"    id="signup-email"    placeholder="이메일"             required autocomplete="email">
        <input type="password" id="signup-password" placeholder="비밀번호 (6자 이상)" required minlength="6" autocomplete="new-password">
        <button type="submit"  id="signup-btn">회원가입</button>
      </form>

      <p id="auth-msg" class="msg"></p>
    </section>

    <!-- 로그인 상태: 전체화면 그리드 -->
    <section id="user-section" class="hidden">
      <p id="user-email"></p>
      <p id="videos-status" class="msg"></p>
      <div id="video-buttons"></div>
      <p id="player-msg" class="msg"></p>
      <button class="logout-btn" onclick="handleLogout()">로그아웃</button>

      <!-- 플레이어 오버레이 -->
      <div id="player-section" class="hidden">
        <div class="player-top">
          <button class="close-btn" onclick="closePlayer()">✕ 닫기</button>
        </div>
        <video id="video-player" controls playsinline></video>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const sb = supabase.createClient("{{ supabase_url }}", "{{ supabase_anon_key }}");
  </script>
  <script src="/static/js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
  </script>
</body>
</html>
